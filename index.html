<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>オーダー管理 P1/P2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f6f4ef;--surface:#fff;--surface-2:#fbfaf7;--border:#ded9cf;--border-strong:#bfb7aa;
  --text:#1d1b18;--muted:#736d64;--accent:#22201d;--accent-fg:#fff;
  --danger:#b8322a;--danger-bg:#fff0ee;--danger-border:#efbdb8;
  --success:#1c7a55;--success-bg:#eaf7f1;--warn:#a36d00;--warn-bg:#fff7df;
  --memo:#5648c7;--memo-bg:#f0edff;--p2:#0969a2;--p2-bg:#e7f4fd;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
  font-size:16px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
button,input,textarea{font:inherit}
button{touch-action:manipulation}
header{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;
  min-height:64px;padding:10px max(16px,env(safe-area-inset-left)) 10px max(16px,env(safe-area-inset-right));
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
}
.header-title{font-size:18px;font-weight:700;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px;min-width:0}
.phase-switcher{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px;gap:3px}
.phase-btn{
  min-height:42px;padding:0 16px;border:0;border-radius:8px;background:transparent;color:var(--muted);
  font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
}
.phase-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.phase-btn.p15.active{background:var(--warn);color:#fff}
.phase-btn.p2.active{background:var(--p2);color:#fff}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 16px;
  border:1px solid var(--border-strong);border-radius:10px;background:var(--surface);color:var(--text);
  font-weight:700;cursor:pointer;white-space:nowrap;
}
.btn:active,.np-key:active,.unit-preset:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
.btn-primary:disabled{opacity:.42;cursor:not-allowed}
.sync-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px max(16px,env(safe-area-inset-left));background:#eef7f1;border-bottom:1px solid #cfe7d9;color:#24513d}
.sync-status{font-size:13px;font-weight:800;margin-right:auto}
.sync-input{height:38px;min-width:180px;border:1px solid #bad9c8;border-radius:8px;background:#fff;padding:0 10px;color:var(--text)}
.sync-btn{height:38px;border:1px solid #98c4ac;border-radius:8px;background:#fff;color:#24513d;font-weight:900;padding:0 12px;cursor:pointer}
.sync-btn.primary{background:#1c7a55;color:#fff;border-color:#1c7a55}
.sync-user{font-size:13px;font-weight:800}
main{width:min(1280px,100%);margin:0 auto;padding:18px max(14px,env(safe-area-inset-left)) 28px max(14px,env(safe-area-inset-right))}
.view{display:none}.view.active{display:block}
.import-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:14px}
.import-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px}
.import-card-header{display:flex;align-items:center;justify-content:space-between;gap:10px}
.import-card-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.04em}
.import-status{font-size:13px;color:var(--muted);white-space:nowrap}.import-status.ok{color:var(--success);font-weight:800}
.drop-zone{display:block;border:2px dashed var(--border-strong);border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;background:var(--surface-2)}
.drop-zone.drag{border-color:var(--accent);background:#fff}.drop-zone input{display:none}
.drop-text{font-size:15px;color:var(--muted);line-height:1.5}.drop-text strong{color:var(--text)}
.field-hint{font-size:12px;color:var(--muted);line-height:1.65}.field-hint span{display:inline-block;background:var(--bg);border-radius:5px;padding:2px 7px;margin:2px}
.merge-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.merge-info{font-size:14px;color:var(--muted)}.merge-info strong{color:var(--text)}
.tabs-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.country-tabs,.customer-tabs{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.country-tabs::-webkit-scrollbar,.customer-tabs::-webkit-scrollbar{display:none}
.country-tabs{background:#faf8f3;border-bottom:2px solid var(--border)}
.customer-tabs{padding:0 12px;background:#fffdf9;border-bottom:1px solid var(--border);gap:2px}
.country-tab,.customer-tab{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;min-height:48px;border:0;background:transparent;color:var(--muted);
  cursor:pointer;white-space:nowrap;font-weight:800;border-bottom:3px solid transparent;
}
.country-tab{padding:0 20px;margin-bottom:-2px}.customer-tab{padding:0 14px;font-weight:700;border-bottom-width:2px}
.country-tab.active,.customer-tab.active{color:var(--text);border-bottom-color:var(--accent);background:var(--surface)}
.country-code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:16px}
.cbadge{font-size:12px;line-height:1;padding:4px 8px;border-radius:999px;font-weight:800}
.all-done{background:var(--success-bg);color:var(--success)}.has-pending{background:var(--danger-bg);color:var(--danger)}.partial{background:var(--warn-bg);color:var(--warn)}
.country-panel,.customer-panel{display:none}.country-panel.active,.customer-panel.active{display:block}
.statusbar{display:flex;gap:14px;align-items:center;padding:14px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:800}.stat-num.done{color:var(--success)}.stat-num.pending{color:var(--danger)}
.stat-label{font-size:12px;color:var(--muted)}.stat-div{width:1px;height:28px;background:var(--border)}
.prog-wrap{flex:1;min-width:120px;height:7px;background:var(--border);border-radius:999px;overflow:hidden}.prog-bar{height:100%;background:var(--success)}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;min-width:980px}
thead th{position:sticky;top:0;background:#faf8f3;z-index:1}
th,td{padding:13px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{font-size:12px;color:var(--muted);font-weight:800;white-space:nowrap}
tbody tr{cursor:pointer}tbody tr:hover td{background:#fbfaf7}
tbody tr.pending td{background:var(--danger-bg)}tbody tr.partial td{background:var(--warn-bg)}tbody tr.done td:first-child{border-left:4px solid var(--success)}
tbody tr.pending td:first-child{border-left:4px solid var(--danger)}tbody tr.partial td:first-child{border-left:4px solid var(--warn)}
.badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
.badge-pending{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}.badge-done{background:var(--success-bg);color:var(--success);border:1px solid #b8e3d1}.badge-partial{background:var(--warn-bg);color:var(--warn);border:1px solid #efd58a}
.icell{display:inline-flex;align-items:center;justify-content:center;min-width:76px;min-height:36px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-weight:700}
.icell.empty{color:var(--muted);font-size:13px;background:var(--bg);border-style:dashed;font-weight:600}
.memo-cell{display:inline-flex;align-items:center;gap:6px;max-width:180px;min-height:36px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;overflow:hidden}
